<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A Letter I Couldn't Say</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

</head>

<body>

<div class="opening" id="opening">

    <div class="letter">

        <div class="envelope">✉</div>

        <h1>A Letter I Couldn't Say</h1>

        <p>
            For someone who unexpectedly became
            part of my everyday.
        </p>

        <button id="openBtn">
            Open the Letter
        </button>

    </div>

</div>


<div class="content" id="content">

    <img src="photo.png" class="photo">

    <div class="paper">

        <h2>Dear You,Zahraaa..</h2>

        <p id="typing"></p>

    </div>

</div>


<audio id="music" loop>

    <source src="Music.mp3" type="audio/mpeg">

</audio>

<script src="script.js"></script>

</body>
</html>
